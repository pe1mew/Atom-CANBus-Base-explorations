; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .

; ---------------------------------------------------------------------------
; Shared settings inherited by all environments
; ---------------------------------------------------------------------------
[env]
platform      = espressif32@6.3.2
board         = m5stack-atom
framework     = arduino
upload_speed  = 1500000
monitor_speed = 115200
build_flags   = -DCORE_DEBUG_LEVEL=5

; ---------------------------------------------------------------------------
; LED cycling demo (original hello-world project)
; ---------------------------------------------------------------------------
[env:helloWorld]
lib_deps   =
    M5Unified=https://github.com/m5stack/M5Unified
    fastled/FastLED
build_src_filter = -<*> +<helloWorld/>

; ---------------------------------------------------------------------------
; CAN PONG responder — echoes PING (0x010) back as PONG (0x011) at 500 kbps
; ---------------------------------------------------------------------------
[env:pongping]
lib_deps         = fastled/FastLED
build_src_filter = -<*> +<pongping/>

